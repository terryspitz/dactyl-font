name: Visual Tests

on:
  push:
    branches: [ master, 'claude/**' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write   # needed to push baseline PNGs back to the branch

jobs:
  visual-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.*

      - name: Install .NET dependencies
        run: |
          dotnet restore
          dotnet tool restore

      - name: Build Fable
        run: dotnet fable src/explorer --outDir web/src/lib/fable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Node dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Build web app
        run: cd web && npm run build

      - name: Run visual tests
        run: cd web && npm run test:visual:update

      - name: Commit new baselines to branch
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add web/tests/__snapshots__/
          if ! git diff --staged --quiet; then
            git commit -m "Update visual test baselines [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No baseline changes to commit"
          fi

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

name: Visual Tests

on:
  push:
    branches: [ main, testing-branch, 'claude/**' ]
  pull_request:
    branches: [ main, testing-branch ]
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Regenerate baseline screenshots and commit them'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  visual-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.*

      - name: Install .NET dependencies
        run: |
          dotnet restore
          dotnet tool restore

      - name: Build Fable
        run: dotnet fable src/explorer --outDir web/src/lib/fable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Build web app
        run: cd web && npm run build

      - name: Run visual tests (compare)
        if: inputs.update_baselines != true
        run: cd web && npm run test:visual

      - name: Update baseline screenshots
        if: inputs.update_baselines == true
        run: cd web && npm run test:visual:update

      - name: Commit updated baselines
        if: inputs.update_baselines == true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/tests/visual.spec.js-snapshots/
          if ! git diff --staged --quiet; then
            git commit -m "Update visual test baselines [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No baseline changes to commit"
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 30

      - name: Upload test results (diff images)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: web/test-results/
          retention-days: 30

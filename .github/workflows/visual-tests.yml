name: Visual Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Regenerate baseline snapshots and commit them back'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  visual-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref }}

      - name: Init fmin submodule
        run: git submodule update --init web/src/lib/fmin

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.*

      - name: Install .NET dependencies
        run: |
          dotnet restore
          dotnet tool restore

      - name: Build Fable
        run: dotnet fable src/explorer --outDir web/src/lib/fable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Node dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick fonts-dejavu-core

      - name: Build web app
        run: cd web && npm run build

      - name: Save snapshots before update
        if: inputs.update_snapshots
        run: |
          while IFS= read -r dir; do
            for f in "$dir"/*.png; do
              [ -f "$f" ] && cp "$f" "${f%.png}__before.png"
            done
          done < <(find web/tests -name '*-snapshots' -type d)

      - name: Run visual tests
        run: cd web && npm run test:visual${{ inputs.update_snapshots && ':update' || '' }}

      - name: Generate diff GIFs
        if: inputs.update_snapshots
        run: |
          mkdir -p web/tests/diffs
          rm -f web/tests/diffs/*.gif
          while IFS= read -r dir; do
            for after in "$dir"/*.png; do
              [ -f "$after" ] || continue
              [[ "$after" == *__before.png ]] && continue
              before="${after%.png}__before.png"
              [ ! -f "$before" ] && continue
              if ! cmp -s "$after" "$before"; then
                name=$(basename "${after%.png}")
                convert "$before" \
                  -fill 'rgba(0,0,0,0.75)' -draw 'rectangle 0,0 150,36' \
                  -fill white -font DejaVu-Sans-Bold -pointsize 24 \
                  -gravity NorthWest -annotate +8+28 'BEFORE' \
                  /tmp/frame-before.png
                convert "$after" \
                  -fill 'rgba(0,0,0,0.75)' -draw 'rectangle 0,0 150,36' \
                  -fill white -font DejaVu-Sans-Bold -pointsize 24 \
                  -gravity NorthWest -annotate +8+28 'AFTER' \
                  /tmp/frame-after.png
                convert -delay 100 /tmp/frame-before.png \
                        -delay 100 /tmp/frame-after.png \
                        -loop 0 "web/tests/diffs/${name}.gif"
                echo "Generated diff: ${name}.gif"
              fi
            done
          done < <(find web/tests -name '*-snapshots' -type d)
          find web/tests -name '*__before.png' -delete
          echo "Diffs generated:"
          ls web/tests/diffs/ 2>/dev/null || echo "(none)"

      - name: Commit updated snapshots
        if: inputs.update_snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/tests/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "Update visual regression snapshots + diff GIFs"
            git push
          fi

      - name: Commit new baselines
        if: always() && !inputs.update_snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/tests/tabs.spec.js-snapshots/ web/tests/tweens.spec.js-snapshots/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No new baselines to commit."
          else
            git commit -m "Add new visual regression baselines"
            git push
          fi

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: |
            web/tests/**/*-snapshots/
            web/test-results/
            web/playwright-report/
          retention-days: 7

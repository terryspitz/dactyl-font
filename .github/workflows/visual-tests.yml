name: Visual Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Regenerate baseline snapshots and commit them back'
        type: boolean
        default: false

jobs:
  visual-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Init fmin submodule
        run: git submodule update --init web/src/lib/fmin

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.*

      - name: Install .NET dependencies
        run: |
          dotnet restore
          dotnet tool restore

      - name: Build Fable
        run: dotnet fable src/explorer --outDir web/src/lib/fable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Node dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Build web app
        run: cd web && npm run build

      - name: Run visual tests
        id: run-tests
        run: |
          cd web
          if find tests -name "*.png" -path "*-snapshots/*" | grep -q .; then
            npm run test:visual
          else
            echo "No baseline snapshots found — creating them automatically."
            npm run test:visual:update
            echo "snapshots_created=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated snapshots
        if: inputs.update_snapshots || steps.run-tests.outputs.snapshots_created == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/tests/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "Update visual regression snapshots [skip ci]"
            # On PR runs the checkout is a detached-HEAD merge commit; push
            # explicitly to the source branch using head_ref (PR) or ref_name (push/dispatch).
            BRANCH="${{ github.head_ref || github.ref_name }}"
            git push origin HEAD:"$BRANCH"
          fi

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: |
            web/tests/**/*-snapshots/
            web/test-results/
            web/playwright-report/
          retention-days: 7

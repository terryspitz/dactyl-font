name: Update Visual Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update snapshots on'
        required: false
        default: ''

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'
          ref: ${{ github.event.inputs.branch || github.ref }}
          # Need write access to push updated snapshots back
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.*

      - name: Install .NET dependencies
        run: |
          dotnet restore
          dotnet tool restore

      - name: Build Fable
        run: dotnet fable src/explorer --outDir web/src/lib/fable

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Node dependencies
        run: cd web && npm ci

      - name: Install Playwright browsers
        run: cd web && npx playwright install --with-deps chromium

      - name: Build web app
        run: cd web && npm run build

      - name: Update snapshots
        run: cd web && npm run test:visual:update

      - name: Commit updated snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/tests/
          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "Update visual regression snapshots"
            git push
          fi

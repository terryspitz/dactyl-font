name: .NET Core

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update and commit visual test snapshots'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        token: ${{ secrets.GITHUB_TOKEN }}
        ref: ${{ github.head_ref || github.ref }}
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.*
    - name: Install dependencies
      run: |
        dotnet restore
        dotnet tool restore
    - name: Build
      run: dotnet build --configuration Release --no-restore
    - name: Build Fable
      run: dotnet fable src/explorer --outDir web/src/lib/fable
    - name: Test
      run: dotnet test --no-restore --verbosity normal

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 22
    - name: Build Web
      run: |
        cd web
        npm ci
        npm run build
    - name: Install Playwright
      run: |
        cd web
        npx playwright install --with-deps chromium

    - name: Run Playwright tests (update snapshots)
      if: github.event_name == 'workflow_dispatch' && inputs.update_snapshots
      run: cd web && npx playwright test --update-snapshots

    - name: Run Playwright tests
      if: github.event_name != 'workflow_dispatch' || !inputs.update_snapshots
      run: cd web && npx playwright test

    - name: Commit updated baselines
      if: github.event_name == 'workflow_dispatch' && inputs.update_snapshots
      env:
        BRANCH: ${{ github.head_ref || github.ref_name }}
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add web/tests/tabs.spec.js-snapshots/ web/screenshots/ || true
        if ! git diff --staged --quiet; then
          git commit -m "Update visual test baselines and tween screenshots"
          git push origin "HEAD:refs/heads/$BRANCH"
        else
          echo "No baseline changes to commit"
        fi

    - name: Upload tween screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tween-screenshots
        path: web/screenshots/
        if-no-files-found: ignore
        retention-days: 30
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: web/playwright-report/
        if-no-files-found: ignore
        retention-days: 30

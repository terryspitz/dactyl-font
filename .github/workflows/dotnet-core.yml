name: .NET Core

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      update_baselines:
        description: 'Regenerate baseline screenshots and commit them'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.*
    - name: Install dependencies
      run: |
        dotnet restore
        dotnet tool restore
    - name: Build
      run: dotnet build --configuration Release --no-restore
    - name: Build Fable
      run: dotnet fable src/explorer --outDir web/src/lib/fable
    - name: Test
      run: dotnet test --no-restore --verbosity normal

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 22
    - name: Build Web
      run: |
        cd web
        npm ci
        npm run build
    - name: Install Playwright
      run: |
        cd web
        npx playwright install --with-deps chromium

    - name: Run visual tests (compare)
      if: inputs.update_baselines != true
      run: cd web && npx playwright test

    - name: Update baseline screenshots
      if: inputs.update_baselines == true
      run: cd web && npm run test:visual:update

    - name: Commit updated baselines
      if: inputs.update_baselines == true
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add web/tests/visual.spec.js-snapshots/
        if ! git diff --staged --quiet; then
          git commit -m "Update visual test baselines [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
        else
          echo "No baseline changes to commit"
        fi

    - name: Upload tween screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tween-screenshots
        path: web/screenshots/
        retention-days: 30
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: web/playwright-report/
        retention-days: 30
